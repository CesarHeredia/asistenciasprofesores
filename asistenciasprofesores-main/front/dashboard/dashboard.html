<!-- dashboard.html -->
<section id="view-dashboard" class="content-view">
  <header class="panel-header flex-header">
    <h1 class="main-title">SISTEMA DE ASISTENCIA - PANEL DE CONTROL</h1>
    <div class="header-actions">
      <button class="action-btn secondary-btn" id="toggle-prof-view-btn" data-action="toggle-view">
        <span>Ver Docentes</span>
      </button>
    </div>
  </header>

  <!-- Stat Cards Grid -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card" id="stat-profesores">
      <span class="stat-number" id="total-profesores">0</span>
      <span class="stat-label">Profesores</span>
    </div>
    <div class="stat-card" id="stat-materias">
      <span class="stat-number" id="total-materias">0</span>
      <span class="stat-label">Materias</span>
    </div>
    <div class="stat-card" id="stat-horas">
      <span class="stat-number" id="total-horas">0</span>
      <span class="stat-label">Horas asignadas</span>
    </div>
    <div class="stat-card" id="stat-asistencias">
      <span class="stat-number" id="total-asistencias">0</span>
      <span class="stat-label">Asistencias</span>
    </div>
  </div>

  <!-- Contenedor con Scroll para Tarjetas -->
  <div class="scroll-container">
    <div class="cards-grid" id="profesores-list">
      <div class="loading-state">Cargando panel de control...</div>
    </div>
  </div>

</section>
