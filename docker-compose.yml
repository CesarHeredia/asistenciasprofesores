services:
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    image: node:20-alpine
    container_name: asistencia_frontend
    volumes:
      - ./front:/app
      - /app/node_modules
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    restart: always
