<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sistema de Asistencia</title>
  <link rel="stylesheet" href="styles.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="app-container">
    <aside class="left-sidebar">

      <div class="logo-container">
        <img src="scr/usmlgoretina-1.png" alt="Logo"
          style="max-width: 100%; height: auto; max-height: 100px; margin: 0 auto; display: block;">
      </div>

      <!-- Botón 1: Gestionar Profesores (Abre el dashboard de profesores) -->
      <nav class="nav-menu">
        <button class="menu-btn active" data-view="dashboard">
          <span class="menu-text">Gestionar<br />profesores</span>
        </button>

        <!-- Botón 2: Gestionar Materias (Abre la lista CRUD de materias) -->
        <button class="menu-btn" data-view="database-materias">
          <span class="menu-text">Gestionar<br />Materias</span>
        </button>

      </nav>
    </aside>

    <!-- 2. Columna Central: Contenido Dinámico -->
    <main id="content" class="center-panel"></main>

    <!-- 3. Columna Derecha: Sidebar de Filtros -->
    <aside class="right-sidebar">
      <div class="clock-card">
        <div class="clock-time" id="sidebar-time">00:00:00</div>
        <div class="clock-date" id="sidebar-date">Cargando fecha...</div>
      </div>

      <div class="search-box">
        <input type="text" id="search-input" placeholder="BUSCAR" />
      </div>

      <div class="filter-section">
        <h3 class="filter-title">FILTRAR POR:</h3>

        <div class="filter-group">
          <label class="filter-label">Materia</label>
          <select class="filter-select" id="filter-materia">
            <option value="">Materia</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">Edificio</label>
          <select class="filter-select" id="filter-edificio">
            <option value="">Edificio</option>
          </select>
        </div>
      </div>

      <div class="checkbox-section">
        <label class="checkbox-container">
          <input type="checkbox" name="dept" value="Departamento 1" />
          <span class="checkmark"></span>
          Departamento 1
        </label>
        <label class="checkbox-container">
          <input type="checkbox" name="dept" value="Departamento 2" />
          <span class="checkmark"></span>
          Departamento 2
        </label>
        <label class="checkbox-container">
          <input type="checkbox" name="dept" value="Departamento 3" />
          <span class="checkmark"></span>
          Departamento 3
        </label>
        <label class="checkbox-container">
          <input type="checkbox" name="dept" value="Departamento 4" />
          <span class="checkmark"></span>
          Departamento 4
        </label>
      </div>

      <div class="attendance-section">
        <h3 class="filter-title">Estado de Asistencia:</h3>
        <select class="filter-select select-margin" id="filter-asistencia-1">
          <option value="">Asistencia</option>
          <option value="presente">Presente</option>
          <option value="ausente">Ausente</option>
        </select>
      </div>
    </aside>

  </div>

  <div id="modals-container"></div>

  <script type="text/javascript" src="/eel.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script type="text/javascript" src="app.js"></script>
</body>

</html>
