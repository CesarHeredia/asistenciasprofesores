<!-- modals.html -->
<!-- MODAL: Formularios Dinámicos de Registro (Añadir/Editar) -->
<div class="modal-overlay hidden" id="crud-modal">
  <div class="modal-card">

    <header class="modal-header">
      <h2 class="modal-title" id="modal-title">Añadir Registro</h2>
      <button class="close-btn" onclick="closeCrudModal()">&times;</button>
    </header>

    <div class="modal-body">
      <form id="crud-form">
        <!-- Campos dinámicos renderizados desde app.js -->
      </form>
    </div>

    <footer class="modal-footer">
      <button class="modal-btn secondary-btn" onclick="closeCrudModal()">Cancelar</button>
      <button class="modal-btn" id="modal-submit-btn">Guardar</button>
    </footer>
  </div>
</div>

<!-- MODAL: Asignación de Horario -->
<div class="modal-overlay hidden" id="schedule-modal">
  <div class="modal-card">
    <header class="modal-header">
      <h2 class="modal-title">Asignar Horario</h2>
      <button class="close-btn" onclick="closeScheduleModal()">&times;</button>
    </header>
    <div class="modal-body">
      <div class="schedule-details" id="schedule-details-text">
        Día: Jueves | Horario: 15:15 - 17:30
      </div>
      <form id="schedule-form">
        <div class="form-group autocomplete-group">
          <label class="form-label">Materia</label>
          <input type="text" class="form-input" id="schedule-materia-input" placeholder="Buscar y seleccionar Materia..." autocomplete="off" required>
          <div id="autocomplete-list-schedule" class="autocomplete-items hidden"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Aula</label>
          <input type="text" class="form-input" id="schedule-aula-input" placeholder="Ej: 101-B o G-01" required />
        </div>
      </form>
    </div>
    <footer class="modal-footer">
      <button class="modal-btn secondary-btn" onclick="closeScheduleModal()">Cancelar</button>
      <button class="modal-btn" id="schedule-submit-btn">Guardar</button>
    </footer>
  </div>
</div>

<!-- MODAL: Escáner de QR con Cámara -->
<div class="modal-overlay hidden" id="qr-scanner-modal">
  <div class="modal-card qr-scanner-card">
    <header class="modal-header">
      <div class="qr-modal-title-group">
        <span class="qr-modal-icon">📷</span>
        <div>
          <h2 class="modal-title" id="qr-modal-title">Escáner de Código QR</h2>
          <span class="qr-modal-subtitle" id="qr-profesor-name">Docente: —</span>
        </div>
      </div>
      <button class="close-btn" onclick="closeQrScannerModal()">&times;</button>
    </header>

    <div class="modal-body qr-modal-body">
      <!-- Video de la cámara -->
      <div class="qr-video-wrapper" id="qr-video-wrapper">
        <video id="qr-video" autoplay playsinline muted></video>
        <canvas id="qr-canvas" style="display:none;"></canvas>
        <!-- Marco de guía de escaneo -->
        <div class="qr-guide-overlay">
          <div class="qr-guide-corner tl"></div>
          <div class="qr-guide-corner tr"></div>
          <div class="qr-guide-corner bl"></div>
          <div class="qr-guide-corner br"></div>
          <div class="qr-scan-line" id="qr-scan-line"></div>
        </div>
      </div>

      <!-- Estado del escáner -->
      <div class="qr-status-bar" id="qr-status-bar">
        <span class="qr-status-dot scanning" id="qr-status-dot"></span>
        <span id="qr-status-text">Iniciando cámara... Apunta al codigo QR</span>
      </div>

      <!-- Panel de resultado (oculto hasta detectar) -->
      <div class="qr-result-box hidden" id="qr-result-box">
        <div class="qr-result-header">
          <span>¡Codigo QR detectado!</span>
        </div>
        <div class="qr-result-content">
          <label class="form-label" style="margin-bottom:6px;">Contenido extraído:</label>
          <div class="qr-result-value" id="qr-result-value">—</div>
        </div>
      </div>
    </div>

    <footer class="modal-footer">
      <button class="modal-btn secondary-btn" onclick="closeQrScannerModal()">Cancelar</button>
      <button class="modal-btn qr-rescan-btn hidden" id="qr-rescan-btn" onclick="restartQrScan()">Volver a
        Escanear</button>
      <button class="modal-btn qr-confirm-btn hidden" id="qr-confirm-btn" onclick="confirmQrSave()">Guardar
        QR</button>
    </footer>
  </div>
</div>
